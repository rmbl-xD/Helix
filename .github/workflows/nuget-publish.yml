name: Publish NuGet Package

on:
  push:
    tags:
      - "v*.*.*"           # triggers on version tags, e.g. v1.2.3
  workflow_dispatch:       # allows manual runs from the Actions tab
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3)"
        required: true

env:
  PROJECT_PATH: Helix/Helix.csproj
  FEED_URL: https://api.nuget.org/v3/index.json

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Helix.Tests/Helix.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Pack
        run: >
          dotnet pack ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-build
          --output ./nupkgs
          /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push ./nupkgs/*.nupkg
          --source ${{ env.FEED_URL }}
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate
