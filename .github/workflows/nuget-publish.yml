name: Publish NuGet Package

on:
  push:
    tags:
      - "v*.*.*"           # triggers on version tags, e.g. v1.2.3
  workflow_dispatch:       # allows manual runs from the Actions tab

env:
  PROJECT_PATH: Helix/Helix.csproj
  FEED_URL: https://nuget.pkg.github.com/rmbl-xD/index.json

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      packages: write   # required to push to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
          source-url: ${{ env.FEED_URL }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Helix.Tests/Helix.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0-preview.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Pack
        run: >
          dotnet pack ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-build
          --output ./nupkgs
          /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push ./nupkgs/*.nupkg
          --source ${{ env.FEED_URL }}
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
